name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Prevent Prisma from trying to reach the real DB during typecheck
  DATABASE_URL: "postgresql://user:pass@localhost:5432/test"
  DIRECT_URL: "postgresql://user:pass@localhost:5432/test"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm db:generate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test
        env:
          PORT: "3000"

  forecast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forecast-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .[dev]
      - run: python -c "from app.server import app; print(app.title)"
